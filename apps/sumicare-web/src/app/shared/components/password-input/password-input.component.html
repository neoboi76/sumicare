<div class="relative">
  <input
    [type]="visible() ? 'text' : 'password'"
    [name]="name"
    [id]="inputId"
    [placeholder]="placeholder"
    [autocomplete]="autocomplete"
    [required]="required"
    [disabled]="disabled"
    [maxlength]="maxlength"
    [ngModel]="value"
    (ngModelChange)="onChange($event)"
    class="w-full border border-slate-300 rounded px-3 py-2 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--sumi-primary)]"
  />
  <button
    type="button"
    (mousedown)="$event.preventDefault()"
    (click)="toggleVisibility()"
    tabindex="-1"
    class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none"
    [attr.aria-label]="visible() ? 'Hide password' : 'Show password'"
  >
    @if (visible()) {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    }
  </button>
</div>

<div class="fixed top-4 right-4 z-[60] flex flex-col gap-2 pointer-events-none w-80 max-w-[calc(100vw-2rem)]">
    @for (toast of toasts(); track toast.id) {
        <button type="button"
                (click)="open(toast)"
                class="pointer-events-auto text-left bg-white rounded-lg shadow-lg border-l-4 border-red-500 px-4 py-3 anim-slide-down hover:bg-slate-50 transition-colors flex items-start gap-3">
            <span class="inline-flex items-center justify-center h-7 w-7 rounded-full bg-red-100 text-red-600 shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </span>
            <span class="flex-1 min-w-0">
                <span class="block text-[10px] uppercase tracking-widest text-slate-500">{{ toast.label }}</span>
                <span class="block text-sm text-slate-900 truncate">{{ toast.summary }}</span>
            </span>
            <button type="button" (click)="$event.stopPropagation(); dismiss(toast.id)"
                    class="shrink-0 text-slate-400 hover:text-slate-700 transition-colors"
                    aria-label="Dismiss">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </button>
    }
</div>

<div class="min-h-screen flex bg-slate-50">
  <aside class="w-64 bg-[var(--sumi-primary)] text-white flex flex-col">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="text-lg font-semibold">{{ branding.branding()?.displayName ?? 'SumiCare' }}</div>
      <div class="text-xs opacity-80 mt-0.5">{{ session()?.role }}</div>
    </div>
    <nav class="flex-1 overflow-y-auto px-2 py-4 space-y-4 text-sm">
      @for (group of visibleGroups(); track group.title) {
        <div>
          <div class="px-3 text-[10px] uppercase tracking-widest opacity-60 mb-1">{{ group.title }}</div>
          @for (item of group.items; track item.route) {
            <a [routerLink]="item.route" routerLinkActive="bg-white/15"
               class="block rounded px-3 py-1.5 hover:bg-white/10">{{ item.label }}</a>
          }
        </div>
      }
    </nav>
    <button (click)="signOut()" class="m-3 rounded bg-white/10 hover:bg-white/15 py-2 text-sm">Sign out</button>
  </aside>
  <main class="flex-1 p-6 overflow-auto">
    <router-outlet></router-outlet>
  </main>
</div>

<div class="space-y-6">
  <header class="flex items-baseline justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-slate-900">Shifts</h1>
      <p class="text-slate-500">Operating shifts. Newer shifts preempt older shifts in the lineup automatically.</p>
    </div>
    <button (click)="showForm.set(true)" class="rounded bg-[var(--sumi-primary)] text-white px-4 py-1.5 text-sm">Add shift</button>
  </header>

  <section class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-100">
        <tr>
          <th class="text-left p-3">Label</th>
          <th class="text-left p-3">Start</th>
          <th class="text-left p-3">End</th>
          <th class="text-left p-3">Expected count</th>
          <th class="text-right p-3"></th>
        </tr>
      </thead>
      <tbody>
        @for (s of shifts(); track s.id) {
          <tr class="border-t hover:bg-slate-50">
            <td class="p-3 font-medium">{{ s.label }}</td>
            <td class="p-3 font-mono">{{ s.startTime }}</td>
            <td class="p-3 font-mono">{{ s.endTime }}</td>
            <td class="p-3">{{ s.expectedCount ?? '-' }}</td>
            <td class="p-3 text-right">
              <button (click)="deactivate(s)" class="text-red-700 hover:underline text-xs">Deactivate</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="5" class="p-6 text-center text-slate-500">No shifts.</td></tr>
        }
      </tbody>
    </table>
  </section>

  @if (showForm()) {
    <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 space-y-4">
        <h2 class="text-xl font-semibold">New shift</h2>
        <label class="block">
          <span class="text-sm text-slate-700">Label</span>
          <input [(ngModel)]="formLabel" name="label" class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
        </label>
        <label class="block">
          <span class="text-sm text-slate-700">Start time</span>
          <input [(ngModel)]="formStart" name="start" type="time" class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
        </label>
        <label class="block">
          <span class="text-sm text-slate-700">End time</span>
          <input [(ngModel)]="formEnd" name="end" type="time" class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
        </label>
        <label class="block">
          <span class="text-sm text-slate-700">Expected therapist count</span>
          <input [(ngModel)]="formExpected" name="expected" type="number" min="0" class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
        </label>
        <div class="flex justify-end gap-2 pt-2">
          <button (click)="showForm.set(false)" class="rounded border border-slate-300 px-4 py-2 text-sm">Cancel</button>
          <button (click)="submit()" class="rounded bg-[var(--sumi-primary)] text-white px-4 py-2 text-sm">Save</button>
        </div>
      </div>
    </div>
  }
</div>

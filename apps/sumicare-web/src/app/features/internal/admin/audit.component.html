<div class="space-y-6">
  <header>
    <h1 class="text-2xl font-semibold text-slate-900">Audit log</h1>
    <p class="text-slate-500">Immutable record of every state-modifying action. Read-only.</p>
  </header>
  <table class="bg-white rounded-xl shadow overflow-hidden w-full text-sm">
    <thead class="bg-slate-100">
      <tr>
        <th class="text-left p-3">When</th>
        <th class="text-left p-3">Actor role</th>
        <th class="text-left p-3">Action</th>
        <th class="text-left p-3">IP</th>
      </tr>
    </thead>
    <tbody>
      @for (entry of entries(); track entry.id) {
        <tr class="border-t">
          <td class="p-3 font-mono text-xs">{{ formatDate(entry.occurredAt) }}</td>
          <td class="p-3">{{ entry.actorRole }}</td>
          <td class="p-3">{{ entry.actionType }}</td>
          <td class="p-3 font-mono text-xs">{{ entry.ipAddress }}</td>
        </tr>
      } @empty {
        <tr><td colspan="4" class="p-6 text-center text-slate-500">No audit events.</td></tr>
      }
    </tbody>
  </table>
</div>

<div class="space-y-6">
  <header>
    <h1 class="text-2xl font-semibold text-slate-900">Welcome to {{ branding.branding()?.displayName ?? 'SumiCare' }}</h1>
    <p class="text-slate-500">Signed in as {{ auth.session()?.role }}.</p>
  </header>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="bg-white rounded-xl shadow p-5">
      <div class="text-sm text-slate-500">Active sessions today</div>
      <div class="text-2xl font-semibold mt-2">{{ activeSessions() }}</div>
    </div>
    <div class="bg-white rounded-xl shadow p-5">
      <div class="text-sm text-slate-500">Therapists in lineup</div>
      <div class="text-2xl font-semibold mt-2">{{ lineupCount() }}</div>
    </div>
    <div class="bg-white rounded-xl shadow p-5">
      <div class="text-sm text-slate-500">Occupied beds</div>
      <div class="text-2xl font-semibold mt-2">{{ occupiedBeds() }} / {{ totalBeds() }}</div>
    </div>
    <div class="bg-white rounded-xl shadow p-5">
      <div class="text-sm text-slate-500">Bookings today</div>
      <div class="text-2xl font-semibold mt-2">{{ todaysBookings() }}</div>
    </div>
  </div>
</div>

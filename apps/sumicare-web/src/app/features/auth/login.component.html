<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-2xl font-semibold text-slate-900 mb-1">SumiCare</h1>
    <p class="text-sm text-slate-500 mb-6">Sign in to continue</p>
    <form (submit)="submit($event)" class="space-y-4">
      <label class="block">
        <span class="text-sm text-slate-700">Username</span>
        <input [(ngModel)]="username" name="username" autocomplete="username" required
               class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" />
      </label>
      <label class="block">
        <span class="text-sm text-slate-700">Password</span>
        <input [(ngModel)]="password" name="password" type="password" autocomplete="current-password" required
               class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" />
      </label>
      <button type="submit" [disabled]="busy()"
              class="w-full rounded-md bg-[var(--sumi-primary)] text-white font-medium py-2.5 hover:opacity-95 disabled:opacity-60">
        {{ busy() ? 'Signing in...' : 'Sign in' }}
      </button>
      @if (error(); as msg) {
        <p class="text-sm text-red-600 mt-2">{{ msg }}</p>
      }
    </form>
  </div>
</div>

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: sumicare-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sumicare}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0

sumicare:
  jwt:
    secret: ${JWT_SECRET:please-change-me-in-production-min-32-chars}
    accessExpiryMs: ${JWT_EXPIRY_MS:900000}
    refreshExpiryMs: ${JWT_REFRESH_EXPIRY_MS:604800000}
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:*}
  biometrics:
    mode: ${BIOMETRICS_MODE:webhook}
    sharedKey: ${BIOMETRICS_SHARED_KEY:change-this-shared-key}
    pollingUrl: ${BIOMETRICS_POLLING_URL:}
    pollingApiKey: ${BIOMETRICS_POLLING_API_KEY:}
    databaseUrl: ${BIOMETRICS_DATABASE_URL:}
    databaseUsername: ${BIOMETRICS_DATABASE_USERNAME:}
    databasePassword: ${BIOMETRICS_DATABASE_PASSWORD:}
    databaseQuery: ${BIOMETRICS_DATABASE_QUERY:SELECT staff_number, event_time, device_id FROM clock_in_events WHERE event_time > ?}
  anthropic:
    apiKey: ${ANTHROPIC_API_KEY:}
  bcrypt:
    cost: 12
  rateLimit:
    loginPerMinute: 10

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.sumicare: INFO
